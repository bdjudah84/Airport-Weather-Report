name: weather-accuracy-daily

# Runs once a day, commits the day's data + report back into the repo (which
# acts as the database), and publishes the report to GitHub Pages.
on:
  schedule:
    # 12:17 UTC. GitHub schedules are UTC-only and may be delayed at peak load;
    # a few minutes past the hour reduces the delay. 12:17 UTC is ~8 AM Eastern,
    # late enough that the previous day has closed in every US timezone.
    - cron: '17 12 * * *'
  workflow_dispatch: {}        # lets you run it on demand from the Actions tab

# Allow the job to commit the updated data + report back to the repository.
permissions:
  contents: write

# Never let two daily runs overlap.
concurrency:
  group: weather-accuracy-daily
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo (brings back yesterday's accumulated data)
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Daily run (verify yesterday, pull today, build report)
        env:
          # Optional freemium keys -- add these as repository secrets to enable
          # those sources. Leave unset to run the 10 free sources only.
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          TOMORROWIO_API_KEY: ${{ secrets.TOMORROWIO_API_KEY }}
          VISUALCROSSING_API_KEY: ${{ secrets.VISUALCROSSING_API_KEY }}
          # Data + report live inside the repo so they persist across runs.
          WX_DATA_DIR: ${{ github.workspace }}/wx_data
        run: python -u -m weather_accuracy daily

      - name: Publish report to the docs/ folder (served by GitHub Pages)
        run: |
          mkdir -p docs
          cp wx_data/report.html docs/index.html

      - name: Commit the day's data and report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wx_data docs
          git commit -m "daily run $(date -u '+%Y-%m-%d %H:%M UTC')" || echo "nothing to commit"
          git push
